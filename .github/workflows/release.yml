name: Automated Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply for a new release"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: automated-release
  cancel-in-progress: false

jobs:
  release:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release files
        id: meta
        run: |
          npm run release:prepare -- --bump "${{ inputs.bump }}" --notes-file "$RUNNER_TEMP/release-notes.md"
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Clean previous VSIX files
        run: rm -f ./*.vsix

      - name: Package extension
        run: npx --no-install vsce package

      - name: Commit release changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No release file changes to commit."
          else
            git commit -m "chore(release): v${{ steps.meta.outputs.version }}"
          fi

      - name: Push release commit
        run: git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create release tag
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag -a "$TAG" -m "Browser Tools for TestCafe ${{ steps.meta.outputs.version }}"
          fi

      - name: Push release tag
        run: git push origin "refs/tags/${{ steps.meta.outputs.tag }}"

      - name: Create or update GitHub Release
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="Browser Tools for TestCafe ${{ steps.meta.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" --target "${{ github.event.repository.default_branch }}" --title "$TITLE" --notes-file "$NOTES_FILE"
          fi

      - name: Upload VSIX to GitHub release
        run: |
          VSIX_FILE="$(find . -maxdepth 1 -name '*.vsix' -print -quit)"
          gh release upload "${{ steps.meta.outputs.tag }}" "$VSIX_FILE" --clobber

      - name: Check Marketplace token
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is not set"
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace
        run: |
          MAX_ATTEMPTS=3
          WAIT_SECONDS=60
          RETRYABLE_ERROR_PATTERN='(429|too many requests|rate limit|rate-limited|concurrency[[:space:]/_-]*vsid)'

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            LOG_FILE="$RUNNER_TEMP/vsce-publish-$attempt.log"

            if npx --no-install vsce publish 2>&1 | tee "$LOG_FILE"; then
              echo "Published successfully on attempt $attempt"
              break
            fi

            if grep -Eqi "$RETRYABLE_ERROR_PATTERN" "$LOG_FILE"; then
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                echo "Publish failed due to rate limiting on attempt $attempt. Retrying in ${WAIT_SECONDS}s..."
                sleep "$WAIT_SECONDS"
                WAIT_SECONDS=$((WAIT_SECONDS * 2))
              else
                echo "All $MAX_ATTEMPTS publish attempts failed due to rate limiting."
                exit 1
              fi
            else
              echo "Publish failed with a non-retryable error on attempt $attempt."
              exit 1
            fi
          done
