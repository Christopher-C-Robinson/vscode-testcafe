name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v2.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release tag matches package version
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="$(node -p "require('./package.json').version")"
          NORMALIZED_TAG="${TAG#v}"
          if [ "$NORMALIZED_TAG" != "$VERSION" ]; then
            echo "Release tag $TAG does not match package version $VERSION"
            exit 1
          fi

      - name: Check Marketplace token
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is not set"
            exit 1
          fi

      - name: Clean previous VSIX files
        run: rm -f ./*.vsix

      - name: Package extension
        run: npx --yes @vscode/vsce@3.7.1 package

      - name: Upload VSIX to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VSIX_FILE="$(find . -maxdepth 1 -name '*.vsix' -print -quit)"
          gh release upload "${{ steps.meta.outputs.tag }}" "$VSIX_FILE" --clobber

      - name: Publish to Visual Studio Marketplace
        run: npx --yes @vscode/vsce@3.7.1 publish -p "$VSCE_PAT"
